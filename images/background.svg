<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="PLML Laboratory background">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="52%" stop-color="#0b1634"/>
      <stop offset="100%" stop-color="#13244d"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#dbeafe" stroke-opacity="0.07" stroke-width="1"/>
    </pattern>
    <pattern id="micro-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M12 0H0V12" fill="none" stroke="#dbeafe" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
    <radialGradient id="glowA" cx="0%" cy="0%" r="100%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <rect width="1600" height="900" fill="url(#micro-grid)" opacity="0.35"/>

  <circle cx="1260" cy="180" r="280" fill="url(#glowB)"/>
  <circle cx="220" cy="120" r="240" fill="url(#glowA)"/>
  <circle cx="1180" cy="760" r="260" fill="url(#glowA)" opacity="0.45"/>
</svg>
