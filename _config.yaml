# site properties and page defaults
title: PLML Laboratory
subtitle: Programming Languages and Machine Learning
description: Programming Languages and Machine Learning Laboratory at Kangwon National University.
header: images/background.svg
footer: images/background.svg
proofer: false

baseurl: /new

# site social media and other links
links:
  github: knu-plml

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post
  - scope:
      type: "publications"
    values:
      layout: publication
  - scope:
      type: "courses"
    values:
      layout: course

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true
  publications:
    output: true
  courses:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
logo-text: false
